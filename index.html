<body>
  <div id="app">🏃‍🏃‍🏃‍💨</br>正在努力加载中...</div>
  <script>
    window.$docsify = {
      name: '🪐HenryZhu的小宇宙',
      logo: 'images/tinyYellow.gif', // 在侧边栏中出现的网站图标，你可以使用CSS来更改大小
      repo: 'https://github.com/HenryZhuHR',
      loadNavbar: true,   // 顶部导航栏 _navbar.md
      // loadSidebar: true,  // 侧边栏 _sidebar.md
      subMaxLevel: 3,     // 显示侧边目录的等级
      coverpage: false,    // 封面
      auto2top: true,     // 切换页面后是否自动跳转到页面顶部。
      search: {           // 搜索栏
        paths: 'auto',
        placeholder: '🔍 搜索栏',
        noData: '😒 无相关内容',
        depth: 6,// Headline depth, 1 - 6
        maxAge: 86400000, // 过期时间，单位毫秒，默认一天
      },
      // relativePath: true,
      count: {    // 字数统计
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(188,188,188)',
        language: 'chinese'
      },
      footer: {   //添加页脚
        // <a href="/" target="_blank">点击这里</a>可以首页回到查看其他内容
        copy: '\
        <div class = "over" >\
          Keep going.\
          </br></br>\
          <span>Copyright &copy; 2021 - now</span>\
          </br>\
          <span id="sitetime"></span><br/>\
        </div>\
        ',
        auth: ' by <a href="https://github.com/HenryZhuHR" target="_blank">Henry Zhu</a>',
        pre: '<hr/>',
        style: 'text-align: center;',
      },
      externalLinkTarget: '_blank', //外链打开方式：_blank表示在新标签页中打开
      'flexible-alerts': {  // Flexible Alerts
        note: {     // [!NOTE|label:注意]
          label: "Note"
        },
        tip: {      // [!TIP]
          label: "Tips"
        },
        warning: {  // [!WARNING]
          label: "Warning"
        },
        attention: {// [!ATTENTION]
          label: "Attention"
        }
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Success'
      },
      
      darklightTheme: {
        // https://docsify-darklight-theme.boopathikumar.me/#/themeSupport?id=designing-your-stylesheet
        // siteFont: "PT Sans",
        defaultTheme: 'light',
        // codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
        // bodyFontSize: '17px',
        dark: {
          accent: '#42b983',
          toogleBackground: '#ffffff',
          background: '#1A1A1A',// '#111111', '#191919', '#212121'
          textColor: '#b4b4b4',
          codeTextColor: '#ffffff',
          codeBackgroundColor: '#0e2233',
          borderColor: '#0d2538',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          sidebarSublink: '#b4b4b4',
          codeTypeColor: '#ffffff',
          // coverBackground: 'linear-gradient(to left bottom, hsl(118, 100%, 85%) 0%,hsl(181, 100%, 85%) 100%)',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
        },
        light: {
          accent: '#42b983',
          toogleBackground: '#091a28',
          background: '#ffffff',
          textColor: '#34495e',
          codeTextColor: '#525252',
          codeBackgroundColor: '#f8f8f8',
          borderColor: 'rgba(0, 0, 0, 0.07)',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          sidebarSublink: '#000000',//b4b4b4
          codeTypeColor: '#091a28',
          // coverBackground: 'linear-gradient(to left bottom, hsl(118, 100%, 85%) 0%,hsl(181, 100%, 85%) 100%)',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
        }
      }
    }
  </script>
